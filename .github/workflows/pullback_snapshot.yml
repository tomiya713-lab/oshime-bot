name: Pullback Daily Snapshot

on:
  workflow_dispatch:
  schedule:
    # Weekdays 16:10 JST == 07:10 UTC
    - cron: '10 7 * * 1-5'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pullback_snapshot.yml'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Build latest pullback diagnostics
        env:
          FORCE_RUN: '1'
        run: python main3_precision.py

      - name: Commit latest diagnostic CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/pullback_*.csv
          git commit -m "Update pullback diagnostics" || echo "No diagnostic changes"
          git pull --rebase origin main
          git push origin main

      - name: Upload pullback reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pullback-diagnostics
          path: reports/pullback_*.csv
          if-no-files-found: warn
          retention-days: 30
