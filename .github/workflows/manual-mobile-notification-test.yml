name: One-time Mobile Notification Test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/manual-mobile-notification-test.yml'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install Japanese font
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Check Discord secret
        run: |
          test -n "${{ secrets.DISCORD_WEBHOOK_URL }}" || (echo "Missing DISCORD_WEBHOOK_URL" && exit 1)

      - name: Run mobile-friendly Japanese notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_RUN: '1'
        run: python main3_japanese.py

      - name: Record successful test
        run: |
          mkdir -p reports
          echo "Mobile notification test succeeded" > reports/manual_mobile_notification_status.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/manual_mobile_notification_status.txt
          git commit -m "Mobile notification test succeeded" || echo "No status change"
          git pull --rebase origin main
          git push origin main
