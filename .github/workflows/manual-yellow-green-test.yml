name: One-time Yellow Green Test

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/manual-yellow-green-test.yml'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '**/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Check Discord secret
        run: |
          test -n "${{ secrets.DISCORD_WEBHOOK_URL }}" || (echo "Missing DISCORD_WEBHOOK_URL" && exit 1)

      - name: Run yellow green screener
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FORCE_RUN: '1'
          APPROACH_BAND_PCT: '2.0'
          CONFIRMED_BAND_PCT: '5.0'
          OHLCV_LOOKBACK_DAYS: '90'
        run: python main3_precision.py

      - name: Commit latest reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/pullback_*.csv
          git commit -m "Update yellow green test reports" || echo "No report changes"
          git pull --rebase origin main
          git push origin main

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yellow-green-test-reports
          path: reports/pullback_*.csv
          if-no-files-found: warn
          retention-days: 30
